<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge of Empires Tools Dashboard</title>
    <link rel="stylesheet" href="overprime/overprime.css">
    <style>
        .dashboard-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .tool-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold-primary);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15);
        }
        .tool-card h3 {
            color: var(--gold-primary);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        .tool-card p {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #ccc;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Forge of Empires Tools</h1>
            <p class="subtitle">A collection of utility calculators and helpers for FoE players</p>
        </header>

        <main class="tools-grid">
            <a href="./overprime/index.html" class="tool-card">
                <h3>GB Overprime Calculator</h3>
                <p>Calculate discount values, update discount strings, and easily copy them for the FOE 1.9 thread.</p>
            </a>
        </main>
    </div>
</body>
</html>
